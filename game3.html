    <style>
        /* --- [1] 공통 레이아웃 (디자인 무결성) --- */
        :root { 
            --primary-color: #1a3a5f; 
            --bg-color: #f4f7f9;

        header { background: var(--primary-color); color: white; padding: 1.2rem; text-align: center; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 800; }
        header h1 a { text-decoration: none; color: inherit; }

        nav.main-nav { background: white; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        nav.main-nav a { text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; padding: 1rem; }
        nav.main-nav a.active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        .category-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; justify-content: center; }
        .category-tabs a { flex: 1; text-align: center; padding: 15px 10px; text-decoration: none; color: #bbb; font-size: 0.9rem; font-weight: bold; max-width: 200px; }
        .category-tabs a.active { color: var(--speed-color) !important; border-bottom: 3px solid var(--speed-color); }

        .game-sub-nav { display: flex; gap: 10px; padding: 15px; justify-content: center; background: #f8f9fa; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .game-sub-nav a { padding: 6px 14px; background: white; border: 1px solid #eee; border-radius: 20px; font-size: 0.75rem; text-decoration: none; color: #666; }
        .game-sub-nav a.active { background: #d35400 !important; color: white !important; }

        /* --- [2] 게임 전용 스타일 --- */
        .container { width: 95%; max-width: 500px; margin: 1.5rem auto; padding: 25px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .game-guide { background: #fff9f5; border-radius: 15px; padding: 15px; font-size: 0.85rem; color: #444; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--speed-color); }

        .score-box { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: var(--primary-color); font-size: 1.1rem; padding: 0 10px; }
        
        #word-display { 
            font-size: 3.5rem; font-weight: 900; margin: 25px 0; height: 120px; 
            display: flex; align-items: center; justify-content: center; 
            background: #fcfcfc; border-radius: 15px; border: 1px solid #f0f0f0; transition: 0.1s;
        }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .color-btn { 
            padding: 22px 10px; border: none; border-radius: 16px; color: white; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .color-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* 흔들림 효과 */
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 기록 섹션 */
        .ranking-container { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 25px; }
        .rank-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        .rank-table th { padding: 10px; color: #888; border-bottom: 1px solid #eee; }
        .rank-table td { padding: 12px 5px; border-bottom: 1px solid #f9f9f9; }

        /* 푸터 */
        footer { text-align: center; padding: 3rem 0; color: #bbb; font-size: 0.75rem; background: #fff; border-top: 1px solid #eee; margin-top: 40px; }
        footer .footer-links { margin-bottom: 15px; }
        footer .footer-links a { color: #bbb; text-decoration: none; margin: 0 10px; }

<body>

    <main class="container">
        <div class="game-guide">
            <strong>🧠 쾌속 판단 훈련 (Stroop)</strong><br>
            글자의 의미가 아닌 <strong>'실제 색상'</strong>을 누르세요! 오답 시 점수가 차감되니 주의하세요.
        </div>
        
        <div class="score-box">
            <span>남은 시간: <span id="time-left" style="color:#e74c3c">30</span>s</span>
            <span>성공: <span id="current-score" style="color:var(--speed-color)">0</span></span>
        </div>
        
        <div id="word-display" onclick="startGame()" style="cursor:pointer; color: #1a3a5f;">START</div>
        
        <div class="button-grid">
            <button class="color-btn" style="background:#e74c3c" onclick="handleBtnClick('#e74c3c')">빨강</button>
            <button class="color-btn" style="background:#3498db" onclick="handleBtnClick('#3498db')">파랑</button>
            <button class="color-btn" style="background:#2ecc71" onclick="handleBtnClick('#2ecc71')">초록</button>
            <button class="color-btn" style="background:#f1c40f" onclick="handleBtnClick('#f1c40f')">노랑</button>
        </div>

        <div class="ranking-container">
            <div id="best-record" style="font-size:0.95rem; color:var(--speed-color); font-weight:bold; margin-bottom:12px;">최고 기록: -</div>
            <table class="rank-table">
                <thead><tr><th>회차</th><th>날짜</th><th>기록</th></tr></thead>
                <tbody id="rankingBody"></tbody>
            </table>
        </div>

    <footer>
        <div class="footer-links">
            <a href="privacy.html">개인정보처리방침</a> | 
            <a href="terms.html">이용약관</a>
        </div>

    </footer>

    <script>
        const colors = [
            {name:'빨강', code:'#e74c3c'}, {name:'파랑', code:'#3498db'},
            {name:'초록', code:'#2ecc71'}, {name:'노랑', code:'#f1c40f'}
        ];
        let score=0, timeLeft=30, gameActive=false, timerInterval, targetColorCode="";

        function startGame() {
            if(gameActive) return;
            gameActive = true;
            score = 0;
            timeLeft = 30;
            document.getElementById('current-score').innerText = score;
            document.getElementById('time-left').innerText = timeLeft;
            document.getElementById('word-display').style.cursor = "default";
            nextQuestion();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextQuestion() {
            const wordIdx = Math.floor(Math.random() * 4);
            let colorIdx;
            
            // 점수가 올라갈수록 글자와 색상이 다를 확률을 높여 난이도 조절
            if (score > 10 && Math.random() > 0.15) {
                do { colorIdx = Math.floor(Math.random() * 4); } while (colorIdx === wordIdx);
            } else {
                colorIdx = Math.floor(Math.random() * 4);
            }
            
            const display = document.getElementById('word-display');
            display.innerText = colors[wordIdx].name;
            display.style.color = colors[colorIdx].code;
            targetColorCode = colors[colorIdx].code;
        }

        function handleBtnClick(selectedColor) {
            if(!gameActive) { startGame(); return; }
            
            if(selectedColor === targetColorCode) {
                score++;
                document.getElementById('current-score').innerText = score;
                nextQuestion();
            } else {
                score = Math.max(0, score - 1); // 오답 감점
                document.getElementById('current-score').innerText = score;
                const display = document.getElementById('word-display');
                display.classList.add('shake');
                setTimeout(() => display.classList.remove('shake'), 300);
                nextQuestion();
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            saveRecord(score);
        }

        function saveRecord(finalCount) {
    const gameId = 'game3'; // 리포트 시스템 통합 ID
    
    // [점수 밸런스 조정]
    // 30초 동안 30개 이상 성공 시 100점 만점 기준 (개당 약 3.3점)
    // 오답 감점을 고려하여 설계되었습니다.
    let reportScore = Math.round((finalCount / 30) * 100);
    reportScore = Math.max(10, Math.min(100, reportScore));

    // 1. 최신 점수 저장
    localStorage.setItem(gameId + '_score', reportScore); 
    
    // 2. 히스토리 데이터 업데이트
    const dateStr = `${new Date().getMonth()+1}/${new Date().getDate()}`;
    let history = JSON.parse(localStorage.getItem(gameId + '_history')) || [];
    // 리포트 평균 산출을 위해 숫자 배열로 저장하거나, 객체 구조를 유지하되 리포트 로직에 맞춤
    history.push(reportScore);
    if(history.length > 10) history.shift();
    localStorage.setItem(gameId + '_history', JSON.stringify(history));

    if (confirm(`훈련 종료!\n기록: ${finalCount}개 (판단 점수: ${reportScore}점)\n\n나의 두뇌 리포트를 확인하시겠습니까?`)) {
        location.href = 'report.html';
    } else {
        // 기존 UI 업데이트 로직 유지용 (별도 저장)
        localStorage.setItem('judgeHistory_UI', JSON.stringify([{ date: dateStr, count: finalCount }]));
        displayHistory();
        document.getElementById('word-display').innerText = "RESTART";
        document.getElementById('word-display').style.cursor = "pointer";
    }
}

        function displayHistory() {
            const body = document.getElementById('rankingBody');
            const history = JSON.parse(localStorage.getItem('judgeHistory')) || [];
            if(history.length > 0) {
                const best = Math.max(...history.map(h => h.count));
                document.getElementById('best-record').innerText = `⭐ 나의 최고 기록: ${best}개`;
                body.innerHTML = history.map((h, i) => `<tr><td>${history.length-i}회</td><td>${h.date}</td><td>${h.count}개</td></tr>`).join('');
            } else {
                body.innerHTML = '<tr><td colspan="3">기록이 없습니다.</td></tr>';
            }
        }

        window.onload = displayHistory;
    </script>
</body>
