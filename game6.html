    <style>
        /* --- [1] 공통 레이아웃 (디자인 무결성 유지) --- */
        :root { 
            --primary-color: #1a3a5f; 
            --bg-color: #f4f7f9; 
            --speed-color: #d35400; 
            --success: #10b981;
            --error: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; color: #333; line-height: 1.6; transition: background-color 0.2s; }
        
        header { background: var(--primary-color); color: white; padding: 1.2rem; text-align: center; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 800; }
        header h1 a { text-decoration: none; color: inherit; }

        nav.main-nav { background: white; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        nav.main-nav a { text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; padding: 1rem; }
        nav.main-nav a.active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        .category-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; justify-content: center; }
        .category-tabs a { flex: 1; text-align: center; padding: 15px 10px; text-decoration: none; color: #bbb; font-size: 0.9rem; font-weight: bold; max-width: 200px; }
        .category-tabs a.active { color: var(--speed-color) !important; border-bottom: 3px solid var(--speed-color); }

        .game-sub-nav { display: flex; gap: 10px; padding: 15px; justify-content: center; background: #f8f9fa; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .game-sub-nav a { padding: 6px 14px; background: white; border: 1px solid #eee; border-radius: 20px; font-size: 0.75rem; text-decoration: none; color: #666; }
        .game-sub-nav a.active { background: #d35400 !important; color: white !important; }

        /* --- [2] 게임 전용 디자인 --- */
        .container { width: 95%; max-width: 500px; margin: 1.5rem auto; padding: 25px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .game-guide { background: #fff9f5; border-radius: 15px; padding: 15px; font-size: 0.85rem; color: #444; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--speed-color); }

        #timer-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--speed-color); transition: width 0.1s linear; }

        /* 미션 시그널 오버레이 */
        #mission-signal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; border-radius: 28px; background: rgba(0,0,0,0.9);
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .signal-text { font-size: 1.8rem; font-weight: 900; line-height: 1.4; }

        .score-display { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--primary-color); }

        .display-area {
            min-height: 180px; background: #fcfcfc; border-radius: 24px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 15px 0; border: 2px solid #f0f0f0; transition: 0.2s;
        }
        #target-name { font-size: 2.8rem; font-weight: 900; color: var(--primary-color); letter-spacing: -1px; }
        #target-emoji { font-size: 5rem; margin-top: -10px; }

        .animal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .animal-btn { 
            background: white; border: 2px solid #f0f0f0; border-radius: 20px; 
            padding: 15px 5px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 0 #eee;
        }
        .animal-btn:active { transform: translateY(3px); box-shadow: none; background: #fff4ed; }
        .animal-btn .emoji { font-size: 2.2rem; display: block; margin-bottom: 5px; }
        .animal-btn .label { font-size: 0.85rem; font-weight: bold; color: #555; }

        .btn-start { 
            width: 100%; max-width: 250px; padding: 18px; background: var(--speed-color); 
            color: white; border: none; border-radius: 35px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; box-shadow: 0 4px 15px rgba(211, 84, 0, 0.2); transition: 0.2s;
        }

        .ranking-container { margin-top: 35px; border-top: 2px dashed #eee; padding-top: 25px; }
        .rank-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .rank-table th { padding: 10px; color: #888; border-bottom: 1px solid #eee; }
        .rank-table td { padding: 12px 5px; border-bottom: 1px solid #f9f9f9; }

        footer { text-align: center; padding: 3rem 0; color: #bbb; font-size: 0.75rem; background: #fff; border-top: 1px solid #eee; margin-top: 40px; }
        footer a { color: #bbb; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <header><h1><a href="/">SKZ 두뇌 훈련소</a></h1></header>

    <nav class="main-nav">
        <a href="/">브레인 분석실</a>
        <a href="dash.html" class="active">두뇌 훈련센터</a>
        <a href="report.html">나의 두뇌점수</a>
    </nav>

    <nav class="category-tabs">
        <a href="game.html">정밀 집중</a>
        <a href="game2.html">전략 논리</a>
        <a href="game3.html" class="active">쾌속 판단</a>
    </nav>

    <nav class="game-sub-nav">
        <a href="game3.html">🚥 순발력</a>
        <a href="game5.html">🔢 수리 판단</a>
        <a href="game6.html" class="active">🦁 동물 인지</a>
    </nav>

    <main class="container">
        <div id="mission-signal"><div class="signal-text" id="signal-title">준비!</div></div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
        
        <div class="game-guide">
            <strong>🧠 동물 인지 (억제 제어)</strong><br>
            중앙의 <strong>[글자]</strong> 미션이면 글자 그대로를, <strong>[그림]</strong> 미션이면 이모지 모양을 보고 버튼을 고르세요.
        </div>

        <div class="score-display" id="score-panel">Score: 0 | Lv.1</div>

        <div class="display-area" id="play-zone">
            <div id="target-name">READY</div>
            <div id="target-emoji">👆</div>
        </div>

        <div class="animal-grid" id="game-ui"></div>
        <button id="startBtn" class="btn-start" onclick="startGame()">훈련 시작하기</button>

        <div class="ranking-container">
            <div id="best-record" style="font-size:0.95rem; color:var(--speed-color); font-weight:bold; margin-bottom:12px;">최고 기록: -</div>
            <table class="rank-table">
                <thead><tr><th>회차</th><th>날짜</th><th>기록</th></tr></thead>
                <tbody id="rankingBody"></tbody>
            </table>
            <button onclick="clearHistory()" style="margin-top:20px; background:none; border:none; color:#ccc; font-size:0.75rem; text-decoration:underline; cursor:pointer;">기록 초기화</button>
        </div>
    </main>

    <footer>
        <div style="margin-bottom: 10px;">
            <a href="privacy.html">개인정보처리방침</a> | <a href="terms.html">이용약관</a>
        </div>
        &copy; 2026 SKZ Brain Lab. All rights reserved.
    </footer>

    <script>
        const animals = [
            { name: "사자", emoji: "🦁" }, { name: "호랑이", emoji: "🐯" },
            { name: "판다", emoji: "🐼" }, { name: "토끼", emoji: "🐰" },
            { name: "여우", emoji: "🦊" }, { name: "돼지", emoji: "🐷" }
        ];

        let score = 0, level = 1, isGameActive = false, currentMission = "", correctTargetName = "", timeLeft = 100, timerInterval;

        // 버튼 자동 생성
        const ui = document.getElementById('game-ui');
        animals.forEach(ani => {
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            btn.onclick = () => checkAnswer(ani);
            btn.innerHTML = `<span class="emoji">${ani.emoji}</span><span class="label">${ani.name}</span>`;
            ui.appendChild(btn);
        });

        function startGame() {
            score = 0; level = 1; timeLeft = 100; isGameActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('score-panel').innerText = "Score: 0 | Lv.1";
            showMission(true);
            startTimer();
        }

        function showMission(isFirst = false) {
            if(!isGameActive) return;
            currentMission = Math.random() > 0.5 ? "글자" : "그림";
            const signal = document.getElementById('mission-signal');
            const title = document.getElementById('signal-title');
            
            const color = currentMission === "글자" ? "rgba(26, 58, 95, 0.95)" : "rgba(211, 84, 0, 0.95)";
            title.innerHTML = `미션 변경!<br><span style='font-size:3.2rem; color:#ffd700;'>[${currentMission}]</span>`;
            signal.style.backgroundColor = color;
            
            signal.style.display = 'flex';
            setTimeout(() => {
                signal.style.display = 'none';
                nextQuestion();
            }, isFirst ? 1500 : 1000);
        }

        function nextQuestion() {
            if(!isGameActive) return;
            level = Math.floor(score / 7) + 1;
            document.getElementById('score-panel').innerText = `Score: ${score} | Lv.${level}`;

            let textIdx = Math.floor(Math.random() * animals.length);
            let emojiIdx;
            // 인지 갈등(Conflict) 유도: 글자와 그림이 일치하지 않게 설정
            do { emojiIdx = Math.floor(Math.random() * animals.length); } while (textIdx === emojiIdx);
            
            document.getElementById('target-name').innerText = animals[textIdx].name;
            document.getElementById('target-emoji').innerText = animals[emojiIdx].emoji;
            
            correctTargetName = currentMission === "글자" ? animals[textIdx].name : animals[emojiIdx].name;
        }

        function checkAnswer(userChoice) {
            if(!isGameActive) return;
            
            if(userChoice.name === correctTargetName) {
                score++;
                timeLeft = Math.min(timeLeft + 7, 100);
                // 6점마다 미션이 무작위로 변경되어 뇌의 유연성 자극
                if(score % 6 === 0) showMission(); 
                else nextQuestion();
            } else {
                timeLeft -= 18; // 오답 패널티 강화
                document.body.style.backgroundColor = "#fee2e2";
                setTimeout(() => document.body.style.backgroundColor = "var(--bg-color)", 200);
            }
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let speed = 0.45 + (level * 0.15); 
                timeLeft -= speed;
                document.getElementById('timer-progress').style.width = Math.max(0, timeLeft) + "%";
                if(timeLeft <= 0) endGame("⏰ 인지 한계 도달! 결과를 확인하시겠습니까?");
            }, 100);
        }

        function endGame(msg) {
    if (!isGameActive) return;
    isGameActive = false;
    clearInterval(timerInterval);

    const gameId = 'game6'; // 리포트 시스템 통합 ID

    // [점수 밸런스 조정]
    // 인지 갈등을 해결해야 하므로 game5보다 개당 점수를 높게 배정
    // 예: 15개 성공, Lv.3 도달 시 -> (15 * 4.5) + (3 * 6) = 약 86점
    let reportScore = Math.round((score * 4.5) + (level * 6));
    reportScore = Math.max(10, Math.min(100, reportScore));

    // 1. 최신 점수 저장 (리포트용)
    localStorage.setItem(gameId + '_score', reportScore);

    // 2. 히스토리 데이터 업데이트 (리포트 평균 산출용)
    let history = JSON.parse(localStorage.getItem(gameId + '_history')) || [];
    history.push(reportScore);
    if(history.length > 10) history.shift();
    localStorage.setItem(gameId + '_history', JSON.stringify(history));

    // 기존 UI용 기록 저장 (animalHistory 유지)
    const dateStr = `${new Date().getMonth()+1}/${new Date().getDate()}`;
    let animalHistory = JSON.parse(localStorage.getItem('animalHistory')) || [];
    animalHistory.unshift({ date: dateStr, score: score, lv: level });
    localStorage.setItem('animalHistory', JSON.stringify(animalHistory.slice(0, 10)));

    if (confirm(`훈련 종료! (최종 점수: ${reportScore}점)\n\n두뇌 분석 리포트를 확인하시겠습니까?`)) {
        location.href = 'report.html';
    } else {
        resetUI();
    }
}

        function resetUI() {
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').innerText = '다시 도전하기';
            document.getElementById('target-name').innerText = 'READY';
            document.getElementById('target-emoji').innerText = '👆';
            document.getElementById('timer-progress').style.width = "100%";
            displayHistory();
        }

        function displayHistory() {
            const body = document.getElementById('rankingBody');
            const history = JSON.parse(localStorage.getItem('animalHistory')) || [];
            if(history.length > 0) {
                const best = Math.max(...history.map(h => h.score));
                document.getElementById('best-record').innerText = `⭐ 나의 최고 기록: ${best}개`;
                body.innerHTML = history.map((h, i) => `<tr><td>${history.length-i}회</td><td>${h.date}</td><td>Lv.${h.lv} / ${h.score}개</td></tr>`).join('');
            } else {
                body.innerHTML = '<tr><td colspan="3">기록이 없습니다.</td></tr>';
            }
        }

        function clearHistory() {
            if(confirm("모든 동물 인지 기록을 초기화할까요?")) {
                localStorage.removeItem('animalHistory');
                location.reload();
            }
        }

        window.onload = displayHistory;
    </script>
</body>
