    <style>
        /* --- [1] 공통 레이아웃 (디자인 무결성) --- */
        :root { 
            --primary-color: #1a3a5f; 
            --bg-color: #f4f7f9; 
            --focus-color: #047857; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; color: #333; line-height: 1.6; }
        
        header { background: var(--primary-color); color: white; padding: 1.2rem; text-align: center; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 800; }
        header h1 a { text-decoration: none; color: inherit; }

        nav.main-nav { background: white; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        nav.main-nav a { text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; padding: 1rem; }
        nav.main-nav a.active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        .category-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; justify-content: center; }
        .category-tabs a { flex: 1; text-align: center; padding: 15px 10px; text-decoration: none; color: #bbb; font-size: 0.9rem; font-weight: bold; max-width: 200px; }
        .category-tabs a.active { color: var(--focus-color) !important; border-bottom: 3px solid var(--focus-color); }

        .game-sub-nav { display: flex; gap: 10px; padding: 15px; justify-content: center; background: #f8f9fa; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .game-sub-nav a { padding: 6px 14px; background: white; border: 1px solid #eee; border-radius: 20px; font-size: 0.75rem; text-decoration: none; color: #666; }
        .game-sub-nav a.active { background: var(--focus-color) !important; color: white !important; }

        /* --- [2] 게임 전용 스타일 --- */
        .container { width: 95%; max-width: 500px; margin: 1.5rem auto; padding: 25px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .game-guide { background: #f0fdf4; border-radius: 15px; padding: 15px; font-size: 0.85rem; color: #444; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--focus-color); }
        #status-msg { font-size: 1.2rem; font-weight: 800; color: var(--primary-color); margin-bottom: 15px; height: 1.6rem; }

        .memory-grid { display: grid; margin: 20px auto; gap: 10px; width: 100%; max-width: 350px; }
        .tile { width: 100%; aspect-ratio: 1/1; background: #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .tile.active { background: var(--focus-color); transform: scale(1.02); }
        .tile.correct { background: #10b981; transform: scale(0.95); }
        .tile.wrong { background: #ef4444; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .btn-start { width: 100%; max-width: 250px; padding: 18px; background: var(--focus-color); color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 1.1rem; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        
        .ranking-container { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 25px; }
        .rank-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        .rank-table th { padding: 10px; color: #888; border-bottom: 1px solid #eee; }
        .rank-table td { padding: 12px 5px; border-bottom: 1px solid #f9f9f9; }

        /* 푸터 */
        footer { text-align: center; padding: 3rem 0; color: #bbb; font-size: 0.75rem; background: #fff; border-top: 1px solid #eee; margin-top: 40px; }
        footer .footer-links { margin-bottom: 15px; }
        footer .footer-links a { color: #bbb; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <header><h1><a href="/">SKZ 두뇌 훈련소</a></h1></header>

    <nav class="main-nav">
        <a href="/">브레인 분석실</a>
        <a href="dash.html" class="active">두뇌 훈련센터</a>
        <a href="report.html">나의 두뇌점수</a>
    </nav>

    <nav class="category-tabs">
        <a href="game.html" class="active">정밀 집중</a>
        <a href="game2.html">전략 논리</a>
        <a href="game3.html">쾌속 판단</a>
    </nav>

    <nav class="game-sub-nav">
        <a href="game.html">🎯 메모리 게임</a>
        <a href="game4.html" class="active">📍 위치기억</a>
        <a href="game8.html">🛒 시장에 가면</a>
    </nav>

    <main class="container">
        <div class="game-guide">
            <strong>🧠 정밀 집중 훈련: 타일 위치</strong><br>
            잠시 반짝이는 타일들의 위치를 기억하고 모두 찾으세요. 레벨이 올라갈수록 더 정밀한 집중력이 요구됩니다.
        </div>
        
        <div id="status-msg">도전할 준비 되셨나요?</div>
        <div id="memoryBoard" class="memory-grid"></div>
        <button id="startBtn" class="btn-start" onclick="startGame()">훈련 시작</button>

        <div class="ranking-container">
            <div id="best-record" style="font-size:0.95rem; color:var(--focus-color); font-weight:bold; margin-bottom:12px;">최고 레벨: -</div>
            <table class="rank-table">
                <thead><tr><th>회차</th><th>날짜</th><th>기록</th></tr></thead>
                <tbody id="rankingBody"></tbody>
            </table>
            <button onclick="clearHistory()" style="margin-top:20px; background:none; border:none; color:#ccc; font-size:0.75rem; text-decoration:underline; cursor:pointer;">기록 초기화</button>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="privacy.html">개인정보처리방침</a> | 
            <a href="terms.html">이용약관</a>
        </div>
        &copy; 2026 SKZ Brain Lab. All rights reserved.
    </footer>

    <script>
        let level = 1, targetTiles = [], userSelection = [], isWait = false;

        function initBoard() {
            const board = document.getElementById('memoryBoard');
            board.innerHTML = '';
            // 레벨에 따라 3x3, 4x4, 5x5 확장
            const size = level < 5 ? 3 : (level < 9 ? 4 : 5);
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            for(let i=0; i < size * size; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.onclick = () => handleTileClick(i, tile);
                board.appendChild(tile);
            }
        }

        function startGame() {
            if(isWait) return;
            isWait = true;
            userSelection = [];
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status-msg').innerText = `Lv.${level} - 기억하세요!`;
            
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => t.className = 'tile');

            targetTiles = [];
            const count = Math.min(10, level + 2);
            while(targetTiles.length < count) {
                let rand = Math.floor(Math.random() * tiles.length);
                if(!targetTiles.includes(rand)) targetTiles.push(rand);
            }

            // 타일 보여주기
            targetTiles.forEach(idx => tiles[idx].classList.add('active'));

            // 노출 시간 (레벨에 비례하여 조정)
            const displayTime = 800 + (level * 100);
            setTimeout(() => {
                targetTiles.forEach(idx => tiles[idx].classList.remove('active'));
                document.getElementById('status-msg').innerText = `위치를 클릭하세요 (${count}곳)`;
                isWait = false;
            }, displayTime);
        }

        function handleTileClick(idx, tile) {
            if(isWait || targetTiles.length === 0 || userSelection.includes(idx)) return;

            if(targetTiles.includes(idx)) {
                tile.classList.add('correct');
                userSelection.push(idx);
                if(userSelection.length === targetTiles.length) {
                    level++;
                    isWait = true;
                    setTimeout(() => {
                        initBoard();
                        isWait = false;
                        startGame();
                    }, 600);
                }
            } else {
                tile.classList.add('wrong');
                isWait = true;
                setTimeout(endGame, 500);
            }
        }

        function endGame() {
    const finalLevel = level;
    const gameId = 'game4'; // 리포트 통합 ID
    
    // [점수 밸런스 조정]
    // Lv.12를 달성하면 100점에 도달하도록 설계 (S자 곡선형 가중치)
    let reportScore;
    if (finalLevel <= 3) {
        reportScore = finalLevel * 10; // 초기 구간
    } else if (finalLevel <= 8) {
        reportScore = 30 + (finalLevel - 3) * 10; // 중기 구간
    } else {
        reportScore = 80 + (finalLevel - 8) * 5; // 숙련자 구간
    }
    reportScore = Math.min(100, Math.round(reportScore));
    
    // 1. 최신 점수 저장
    localStorage.setItem(gameId + '_score', reportScore);
    
    // 2. 히스토리 데이터 업데이트 (리포트 평균 산출용)
    let history = JSON.parse(localStorage.getItem(gameId + '_history')) || [];
    history.push(reportScore);
    if(history.length > 10) history.shift();
    localStorage.setItem(gameId + '_history', JSON.stringify(history));

    // 기존 UI용 기록 저장 (옵션)
    const dateStr = `${new Date().getMonth()+1}/${new Date().getDate()}`;
    let memHistory = JSON.parse(localStorage.getItem('memHistory')) || [];
    memHistory.unshift({ date: dateStr, score: finalLevel });
    localStorage.setItem('memHistory', JSON.stringify(memHistory.slice(0, 10)));

    if (confirm(`훈련 종료! (최종 레벨: ${finalLevel})\n두뇌 정밀도 점수: ${reportScore}점\n\n리포트를 확인하시겠습니까?`)) {
        location.href = 'report.html';
    } else {
        level = 1;
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('startBtn').innerText = '다시 도전하기';
        document.getElementById('status-msg').innerText = '훈련 완료';
        initBoard();
        displayHistory();
        isWait = false;
    }
}

        function displayHistory() {
            const body = document.getElementById('rankingBody');
            const history = JSON.parse(localStorage.getItem('memHistory')) || [];
            if(history.length > 0) {
                const best = Math.max(...history.map(h => h.score));
                document.getElementById('best-record').innerText = `⭐ 나의 최고 레벨: Lv.${best}`;
                body.innerHTML = history.map((h, i) => `<tr><td>${history.length-i}회</td><td>${h.date}</td><td>Lv.${h.score}</td></tr>`).join('');
            } else {
                body.innerHTML = '<tr><td colspan="3">기록이 없습니다.</td></tr>';
            }
        }

        function clearHistory() { 
            if(confirm("모든 기록을 초기화할까요?")) { 
                localStorage.removeItem('memHistory'); 
                location.reload(); 
            } 
        }

        window.onload = () => {
            initBoard();
            displayHistory();
        };
    </script>
</body>
