    <style>
        /* --- [1] 공통 레이아웃 (디자인 무결성 유지) --- */

            --primary-color: #1a3a5f;

            --success: #10b981;

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        nav.main-nav { background: white; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        nav.main-nav a { text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; padding: 1rem; }
        nav.main-nav a.active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        .category-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; justify-content: center; }
        .category-tabs a { flex: 1; text-align: center; padding: 15px 10px; text-decoration: none; color: #bbb; font-size: 0.9rem; font-weight: bold; max-width: 200px; }
        .category-tabs a.active { color: var(--speed-color) !important; border-bottom: 3px solid var(--speed-color); }

        .game-sub-nav { display: flex; gap: 10px; padding: 15px; justify-content: center; background: #f8f9fa; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .game-sub-nav a { padding: 6px 14px; background: white; border: 1px solid #eee; border-radius: 20px; font-size: 0.75rem; text-decoration: none; color: #666; }
        .game-sub-nav a.active { background: #d35400 !important; color: white !important; }

        /* --- [2] 게임 전용 디자인 --- */
        .container { width: 95%; max-width: 500px; margin: 1.5rem auto; padding: 25px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .game-guide { background: #fff9f5; border-radius: 15px; padding: 15px; font-size: 0.85rem; color: #444; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--speed-color); }

        #timer-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--speed-color); transition: width 0.1s linear; }

        .question-box { font-size: 2.3rem; font-weight: 800; margin: 20px 0; color: var(--primary-color); min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fcfcfc; border-radius: 20px; border: 1px solid #f0f0f0; transition: 0.2s; position: relative; }
        
        .feedback-text { font-size: 1.1rem; font-weight: bold; margin-top: 10px; height: 1.5rem; }
        .is-correct { color: var(--success); }
        .is-wrong { color: var(--error); }

        .btn-group { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .choice-btn { width: 95px; height: 95px; border: none; border-radius: 28px; font-size: 2.5rem; font-weight: bold; cursor: pointer; color: white; transition: transform 0.1s, box-shadow 0.2s; }
        .btn-o { background: var(--success); box-shadow: 0 6px 0 #059669; }
        .btn-x { background: var(--error); box-shadow: 0 6px 0 #dc2626; }
        .choice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 transparent; }

        .score-display { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--primary-color); }
        .btn-start { width: 100%; max-width: 250px; padding: 18px; background: var(--speed-color); color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }

        .ranking-container { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 25px; }
        .rank-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        .rank-table th { padding: 10px; color: #888; border-bottom: 1px solid #eee; }
        .rank-table td { padding: 12px 5px; border-bottom: 1px solid #f9f9f9; }

        footer { text-align: center; padding: 3rem 0; color: #bbb; font-size: 0.75rem; background: #fff; border-top: 1px solid #eee; margin-top: 40px; }
        footer a { color: #bbb; text-decoration: none; margin: 0 10px; }
    </style>

<body>

    <main class="container">
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <div class="game-guide">
            <strong>🔢 쾌속 판단: 수리 연산</strong><br>
            수식이 맞으면 O, 틀리면 X를 누르세요. 정답이면 시간이 충전되지만, 오답이면 시간이 크게 단축됩니다!
        </div>
        
        <div class="score-display" id="current-score">Score: 0 | Lv.1</div>
        <div class="question-box" id="question-area">
            <div id="question">READY</div>
            <div id="feedback" class="feedback-text"></div>
        </div>
        
        <div class="btn-group" id="game-controls" style="display: none;">
            <button class="choice-btn btn-o" onclick="checkAnswer(true)">O</button>
            <button class="choice-btn btn-x" onclick="checkAnswer(false)">X</button>
        </div>
        
        <button id="startBtn" class="btn-start" onclick="startGame()">훈련 시작</button>

        <div class="ranking-container">
            <div id="best-record" style="font-size:0.95rem; color:var(--speed-color); font-weight:bold; margin-bottom:12px;">최고 기록: -</div>
            <table class="rank-table">
                <thead><tr><th>회차</th><th>날짜</th><th>기록</th></tr></thead>
                <tbody id="rankingBody"></tbody>
            </table>
            <button onclick="clearHistory()" style="margin-top:20px; background:none; border:none; color:#ccc; font-size:0.75rem; text-decoration:underline; cursor:pointer;">기록 초기화</button>
        </div>
    </main>

    <footer>
        <div style="margin-bottom: 10px;">
            <a href="privacy.html">개인정보처리방침</a> | <a href="terms.html">이용약관</a>
        </div>
        &copy; 2026 SKZ Brain Lab. All rights reserved.
    </footer>

    <script>
        let score = 0, timeLeft = 100, timerInterval, currentQuestion = null, isGameActive = false;
        let level = 1, actualResult = 0, isProcessing = false;

        function startGame() {
            score = 0; level = 1; timeLeft = 100; isGameActive = true; isProcessing = false;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
            document.getElementById('feedback').innerText = "";
            updateScoreDisplay();
            nextQuestion();
            startTimer();
        }

        function updateScoreDisplay() {
            document.getElementById('current-score').innerText = `Score: ${score} | Lv.${level}`;
        }

        function nextQuestion() {
            isProcessing = false;
            level = Math.floor(score / 8) + 1; // 레벨업 기준 조정
            updateScoreDisplay();
            document.getElementById('feedback').innerText = "";
            document.getElementById('question-area').style.borderColor = "#f0f0f0";

            let q = generateCalculation(level);
            actualResult = q.ans;

            let isTrue = Math.random() > 0.5;
            let displayVal = isTrue ? actualResult : actualResult + (Math.random() > 0.5 ? rand(1, 5) : rand(-5, -1));
            
            if(!isTrue && displayVal === actualResult) displayVal += 2;

            document.getElementById('question').innerText = `${q.text} = ${displayVal}`;
            currentQuestion = { ans: isTrue, text: q.text, displayed: displayVal };
            
            const qElem = document.getElementById('question');
            qElem.style.fontSize = q.text.length > 12 ? "1.8rem" : "2.3rem";
        }

        function generateCalculation(lv) {
            let a, b, c, op1, op2, text, ans;
            const ops = ['+', '-', '*', '/'];

            if (lv <= 2) {
                op1 = ops[rand(0, 1)];
                a = rand(5, 30); b = rand(5, 30);
                if(op1 === '-') { a = Math.max(a, b); b = Math.min(a, b); }
                text = `${a} ${op1} ${b}`;
                ans = eval(text);
            } else if (lv <= 5) {
                op1 = ops[rand(0, 3)];
                if(op1 === '/') { ans = rand(2, 10); b = rand(2, 9); a = ans * b; }
                else if(op1 === '*') { a = rand(2, 9); b = rand(2, 15); ans = a * b; }
                else { a = rand(10, 50); b = rand(10, 50); ans = eval(`${a}${op1}${b}`); }
                text = `${a} ${op1.replace('*','×').replace('/','÷')} ${b}`;
            } else {
                op1 = ops[rand(0, 3)];
                op2 = ops[rand(0, 2)];
                if(op1 === '/') {
                    let tempAns = rand(2, 10); b = rand(2, 9); a = tempAns * b;
                    c = rand(1, 20);
                    text = `${a} ÷ ${b} ${op2} ${c}`;
                    ans = eval(`${tempAns}${op2}${c}`);
                } else if(op2 === '/') {
                    let tempAns = rand(2, 10); c = rand(2, 9); let b_temp = tempAns * c;
                    a = rand(1, 30);
                    text = `${a} ${op1} ${b_temp} ÷ ${c}`;
                    ans = eval(`${a}${op1}${tempAns}`);
                } else {
                    a = rand(2, 12); b = rand(2, 8); c = rand(2, 10);
                    text = `${a} ${op1.replace('*','×')} ${b} ${op2.replace('*','×')} ${c}`;
                    ans = eval(text.replace(/×/g, '*'));
                }
            }
            return { text, ans };
        }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function checkAnswer(userAns) {
            if (!isGameActive || isProcessing) return;
            isProcessing = true;

            const feedback = document.getElementById('feedback');
            const area = document.getElementById('question-area');

            if (userAns === currentQuestion.ans) {
                score++;
                timeLeft = Math.min(timeLeft + 6, 100); // 정답 시 시간 보너스
                feedback.innerText = "정답! +Time";
                feedback.className = "feedback-text is-correct";
                area.style.borderColor = "var(--success)";
                setTimeout(nextQuestion, 300);
            } else {
                timeLeft -= 18; // 오답 패널티 강화
                feedback.innerText = `오답! (정답: ${actualResult})`;
                feedback.className = "feedback-text is-wrong";
                area.style.borderColor = "var(--error)";
                document.body.style.backgroundColor = "#fee2e2";
                setTimeout(() => {
                    document.body.style.backgroundColor = "var(--bg-color)";
                    nextQuestion();
                }, 800);
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let speed = 0.5 + (level * 0.12); 
                timeLeft -= speed;
                document.getElementById('timer-progress').style.width = Math.max(0, timeLeft) + "%";
                if (timeLeft <= 0) endGame("⏰ 시간 종료! 분석 리포트를 확인하시겠습니까?");
            }, 100);
        }

        function endGame(customMessage) {
    if (!isGameActive) return;
    isGameActive = false;
    clearInterval(timerInterval);

    const gameId = 'game5'; // 리포트 시스템 통합 ID

    // [점수 밸런스 조정]
    // 기본 점수: 성공 개수당 3점 + 도달 레벨당 5점 가산
    // 예: Lv.5에서 20개 성공 시 -> (20 * 3) + (5 * 5) = 85점
    let reportScore = Math.round((score * 3) + (level * 5));
    reportScore = Math.max(10, Math.min(100, reportScore));

    // 1. 최신 점수 저장 (리포트용)
    localStorage.setItem(gameId + '_score', reportScore);

    // 2. 히스토리 데이터 업데이트 (리포트 평균 산출용)
    let history = JSON.parse(localStorage.getItem(gameId + '_history')) || [];
    history.push(reportScore);
    if(history.length > 10) history.shift();
    localStorage.setItem(gameId + '_history', JSON.stringify(history));

    // 기존 UI용 기록 저장 (기존 mathHistory 호환 유지)
    const dateStr = `${new Date().getMonth()+1}/${new Date().getDate()}`;
    let mathHistory = JSON.parse(localStorage.getItem('mathHistory')) || [];
    mathHistory.unshift({ date: dateStr, score: score, lv: level });
    localStorage.setItem('mathHistory', JSON.stringify(mathHistory.slice(0, 10)));

    if (confirm(`훈련 종료! (최종 점수: ${reportScore}점)\n\n나의 두뇌 리포트를 확인하시겠습니까?`)) {
        location.href = 'report.html';
    } else {
        resetUI();
    }
}

        function resetUI() {
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').innerText = '다시 도전하기';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('question').innerText = 'READY';
            document.getElementById('feedback').innerText = "";
            document.getElementById('timer-progress').style.width = "100%";
            displayHistory();
        }

        function displayHistory() {
            const body = document.getElementById('rankingBody');
            const history = JSON.parse(localStorage.getItem('mathHistory')) || [];
            if(history.length > 0) {
                const best = Math.max(...history.map(h => h.score));
                document.getElementById('best-record').innerText = `⭐ 나의 최고 기록: ${best}개`;
                body.innerHTML = history.map((h, i) => `<tr><td>${history.length-i}회</td><td>${h.date}</td><td>Lv.${h.lv} / ${h.score}개</td></tr>`).join('');
            } else {
                body.innerHTML = '<tr><td colspan="3">기록이 없습니다.</td></tr>';
            }
        }

        function clearHistory() { 
            if(confirm("모든 수리 판단 기록을 초기화할까요?")) { 
                localStorage.removeItem('mathHistory'); 
                location.reload(); 
            } 
        }

        window.onload = displayHistory;
    </script>
</body>
