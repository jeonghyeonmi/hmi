<body>

    <main class="container">
        <div id="level-info">STAGE 1</div>
        <div id="status-msg">준비하세요!</div>
        <div id="timer">0.00</div>
        <div id="gameBoard" class="game-board"></div>

        <section class="info-box">
            <p><strong>💡 게임 방법:</strong> 시작 시 3초 동안 공개되는 카드의 위치를 기억하세요. 레벨이 올라갈수록 카드의 개수가 늘어납니다. 최종 3단계 완료 후 당신의 <strong>두뇌 점수</strong>가 공개됩니다.</p>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="privacy.html">개인정보처리방침</a> | 
            <a href="terms.html">이용약관</a>
        </div>

    </footer>

    <script>
        const emojisMaster = ['🍎', '🍌', '🍓', '🍊', '🍇', '🍉', '🥝', '🥑', '🍍', '🍒', '🍑', '🍋'];
        let currentLevel = 1;
        let totalTime = 0;
        let cards = [], flippedCards = [], matchedCount = 0;
        let timerInterval, startTime, isMemorizing = true;

        function initGame() {
            clearInterval(timerInterval);
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            // 레벨별 카드 쌍 설정: 1단계(6쌍/12장), 2단계(8쌍/16장), 3단계(10쌍/20장)
            let pairs = 4 + (currentLevel * 2); 
            let selectedEmojis = emojisMaster.slice(0, pairs);
            cards = [...selectedEmojis, ...selectedEmojis];
            cards.sort(() => Math.random() - 0.5);
            
            matchedCount = 0; 
            flippedCards = []; 
            isMemorizing = true;
            
            document.getElementById('level-info').innerText = `STAGE ${currentLevel}`;
            document.getElementById('status-msg').innerText = "3초 동안 카드를 암기하세요!";
            document.getElementById('timer').innerText = "MEMORIZE";

            cards.forEach(emoji => {
                const card = document.createElement('div');
                card.classList.add('card', 'flipped'); 
                card.dataset.emoji = emoji;
                card.innerHTML = `<div class="card-front"></div><div class="card-back">${emoji}</div>`;
                board.appendChild(card);
            });

            setTimeout(() => {
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(card => {
                    card.classList.remove('flipped');
                    card.onclick = () => flipCard(card);
                });
                isMemorizing = false;
                document.getElementById('status-msg').innerText = "똑같은 짝을 찾으세요!";
                startTimer();
            }, 3000);
        }

        function startTimer() {
            startTime = new Date();
            timerInterval = setInterval(() => {
                const elapsed = (new Date() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(2);
            }, 10);
        }

        function flipCard(card) {
            if (isMemorizing || flippedCards.length >= 2 || card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if (flippedCards.length === 2) setTimeout(checkMatch, 500);
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.emoji === c2.dataset.emoji) {
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === cards.length) {
                    clearInterval(timerInterval);
                    const levelTime = parseFloat(document.getElementById('timer').innerText);
                    totalTime += levelTime;

                    if (currentLevel < 3) {
                        alert(`Stage ${currentLevel} 클리어!\n기록: ${levelTime}초\n확인을 누르면 다음 단계로 진행합니다.`);
                        currentLevel++;
                        initGame();
                    } else {
                        finishGame();
                    }
                }
            } else {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                flippedCards = [];
            }
        }

        function finishGame() {
    // [두뇌 점수 산출 로직] 3단계 총합 기준: 45초 이내 100점, 이후 1초당 3점 감점
    let brainScore = Math.max(10, 100 - Math.floor((totalTime - 45) * 3));
    if (totalTime <= 45) brainScore = 100;

    alert(`모든 스테이지 완료!\n총 소요 시간: ${totalTime.toFixed(2)}초\n당신의 두뇌 점수: ${brainScore}점`);
    
    // --- 리포트 시스템과 동기화 ---
    const gameId = 'game'; // 이 게임의 ID
    localStorage.setItem(gameId + '_score', brainScore); // 최신 점수 저장
    
    // 히스토리(최근 5회 기록용) 업데이트
    let history = JSON.parse(localStorage.getItem(gameId + '_history')) || [];
    history.push(brainScore);
    if(history.length > 10) history.shift(); // 최대 10개까지만 유지
    localStorage.setItem(gameId + '_history', JSON.stringify(history));
    
    location.href = 'report.html';
}
        window.onload = initGame;
    </script>
