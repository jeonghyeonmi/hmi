    <style>
        /* --- [1] 공통 레이아웃 (디자인 무결성) --- */

        nav.main-nav a { text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; padding: 1rem; }

        .game-sub-nav a { padding: 6px 14px; background: white; border: 1px solid #eee; border-radius: 20px; font-size: 0.75rem; text-decoration: none; color: #666; }
        .game-sub-nav a.active { background: #b91c1c !important; color: white !important; }

        /* --- [2] 게임 전용 스타일 --- */
        .container { width: 95%; max-width: 500px; margin: 1.5rem auto; padding: 25px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .game-guide { background: #fff5f5; border-radius: 15px; padding: 15px; font-size: 0.85rem; color: #444; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--logic-color); }
        #timer { font-size: 2.8rem; font-weight: 800; color: var(--primary-color); margin: 10px 0; display: block; font-variant-numeric: tabular-nums; }

        .sudoku-grid { display: grid; margin: 20px auto; background: #333; border: 2px solid #333; gap: 1px; width: fit-content; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cell { background: white; display: flex; align-items: center; justify-content: center; aspect-ratio: 1/1; position: relative; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-weight: 800; color: var(--logic-color); outline: none; font-size: 1.4rem; background: #fffdf0; }
        .cell.fixed { background: #f8f9fa; font-weight: 800; color: #2c3e50; font-size: 1.4rem; }
        .cell input.duplicate-error { background: #fff5f5; color: var(--error-border); border: 2px solid var(--error-border); }
        
        /* 그리드 크기별 대응 */
        .grid-3 .cell { width: 85px; height: 85px; }
        .grid-4 .cell { width: 65px; height: 65px; }
        .grid-9 .cell { width: min(38px, 9vw); height: min(38px, 9vw); font-size: 1.1rem; }

        .btn-check { width: 100%; max-width: 250px; padding: 15px; background: #eee; color: #999; border: none; border-radius: 30px; font-weight: bold; font-size: 1rem; margin-top: 20px; transition: 0.3s; }
        .btn-check.ready { background: #2ecc71; color: white; cursor: pointer; }

        /* 푸터 */

        footer .footer-links { margin-bottom: 15px; }
        footer .footer-links a { color: #bbb; text-decoration: none; margin: 0 10px; }

<body>

    <main class="container">
        <div class="game-guide" id="levelDisplay">
            <strong>🧠 전략 논리 훈련: 스도쿠</strong><br>
            가로, 세로 줄에 숫자가 중복되지 않게 채우세요.
        </div>

        <span id="timer">0.00</span>
        <div id="sudokuBoard" class="sudoku-grid"></div>
        <button id="checkBtn" class="btn-check">모든 칸을 채워주세요</button>
    </main>

    <footer>
        <div class="footer-links">
            <a href="privacy.html">개인정보처리방침</a> | 
            <a href="terms.html">이용약관</a>
        </div>
        &copy; 2026 SKZ Brain Lab. All rights reserved.
    </footer>

    <script>
        let currentLevel = 1, startTime, timerInterval, gameActive = false;
        
        const config = { 
            1: {size: 3, holes: 3, maxScore: 10, next: 2, label: "입문(3x3)"}, 
            2: {size: 4, holes: 6, maxScore: 30, next: 4, label: "초급(4x4)"}, 
            4: {size: 9, holes: 30, maxScore: 100, next: null, label: "마스터(9x9)"} 
        };

        function initGame() {
            const board = document.getElementById('sudokuBoard');
            const settings = config[currentLevel];
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = '0.00';
            document.getElementById('checkBtn').className = 'btn-check';
            document.getElementById('checkBtn').innerText = "모든 칸을 채워주세요";
            document.getElementById('levelDisplay').innerHTML = `<strong>🧠 스도쿠 (${settings.label})</strong><br>논리적 추론으로 빈칸을 채우세요. 마스터 완료 시 리포트로 이동합니다.`;
            
            board.className = `sudoku-grid grid-${settings.size}`;
            board.style.gridTemplateColumns = `repeat(${settings.size}, 1fr)`;
            board.innerHTML = '';
            
            let solution = [];
            for(let i=0; i<settings.size; i++) {
                let row = [];
                for(let j=0; j<settings.size; j++) row.push(((i + j) % settings.size) + 1);
                solution.push(row);
            }
            solution.sort(() => Math.random() - 0.5);

            let holeIndices = [];
            while(holeIndices.length < settings.holes) {
                let r = Math.floor(Math.random() * (settings.size * settings.size));
                if(!holeIndices.includes(r)) holeIndices.push(r);
            }

            for(let i=0; i<settings.size; i++) {
                for(let j=0; j<settings.size; j++) {
                    const cell = document.createElement('div');
                    const index = i * settings.size + j;
                    cell.className = 'cell';
                    if(!holeIndices.includes(index)) {
                        cell.classList.add('fixed');
                        cell.innerText = solution[i][j];
                    } else {
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.inputMode = 'numeric';
                        input.oninput = function() {
                            if(!gameActive) startTimer();
                            if(this.value.length > 1) this.value = this.value.slice(0,1);
                            checkRealtimeValidation();
                            checkAutoFinish(); 
                        };
                        cell.appendChild(input);
                    }
                    board.appendChild(cell);
                }
            }
        }

        function startTimer() {
            gameActive = true;
            startTime = new Date();
            timerInterval = setInterval(() => {
                const elapsed = (new Date() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(2);
            }, 10);
        }

        function checkRealtimeValidation() {
            const size = config[currentLevel].size;
            const cells = document.querySelectorAll('.cell');
            document.querySelectorAll('.cell input').forEach(inp => inp.classList.remove('duplicate-error'));

            for (let i = 0; i < size; i++) {
                validateLine(cells, i, 'row', size);
                validateLine(cells, i, 'col', size);
            }
        }

        function validateLine(cells, lineIdx, type, size) {
            let seen = {};
            for (let i = 0; i < size; i++) {
                const cellIdx = (type === 'row') ? (lineIdx * size + i) : (i * size + lineIdx);
                const cell = cells[cellIdx];
                const val = cell.classList.contains('fixed') ? cell.innerText : cell.querySelector('input').value;
                if (val && val !== "") {
                    if (seen[val]) seen[val].push(cellIdx);
                    else seen[val] = [cellIdx];
                }
            }
            for (let val in seen) {
                if (seen[val].length > 1) {
                    seen[val].forEach(idx => {
                        const input = cells[idx].querySelector('input');
                        if (input) input.classList.add('duplicate-error');
                    });
                }
            }
        }

        function checkAutoFinish() {
            const inputs = document.querySelectorAll('.cell input');
            const btn = document.getElementById('checkBtn');
            let allFilled = true, hasError = false;
            inputs.forEach(input => { 
                if(!input.value) allFilled = false;
                if(input.classList.contains('duplicate-error')) hasError = true;
            });

            if(allFilled && !hasError) {
                btn.className = 'btn-check ready';
                btn.innerText = "검증 완료!";
                setTimeout(finishLevel, 500); 
            } else if (hasError) {
                btn.className = 'btn-check error';
                btn.innerText = "중복된 숫자가 있습니다!";
            } else if (allFilled) {
                btn.innerText = "중복은 없지만 규칙을 확인하세요";
            }
        }

        // 점수 산출 로직 보강 (마스터 단계 기준 100점 만점 설계)
function finishLevel() {
    if(!gameActive) return;
    clearInterval(timerInterval);
    gameActive = false;
    
    const time = parseFloat(document.getElementById('timer').innerText);
    let finalScore;

    if (currentLevel === 4) { // 마스터(9x9) 기준
        // 2분(120초) 이내면 100점, 그 이후 1초당 0.5점 감점
        finalScore = Math.max(40, Math.round(100 - (Math.max(0, time - 120) * 0.5)));
    } else if (currentLevel === 2) { // 초급(4x4)
        // 30초 이내 70점, 이후 감점 (초급이므로 최대치를 낮게 설정하여 마스터 도전을 유도)
        finalScore = Math.min(70, Math.max(20, Math.round(70 - (time - 30))));
    } else { // 입문(3x3)
        finalScore = Math.min(40, Math.max(10, Math.round(40 - time)));
    }

    if(config[currentLevel].next) {
        if(confirm(`${config[currentLevel].label} 클리어!\n기록: ${time}초\n\n다음 단계(더 높은 점수)에 도전하시겠습니까?`)) {
            currentLevel = config[currentLevel].next;
            initGame();
        } else {
            saveAndExit(finalScore);
        }
    } else {
        alert(`마스터 단계 클리어! 최종 추론 점수: ${finalScore}점`);
        saveAndExit(finalScore);
    }
}

        function saveAndExit(score) {
    const gameId = 'game2'; // 리포트에서 사용하는 ID (추론력 매핑)
    
    // 1. 최신 점수 저장
    localStorage.setItem(gameId + '_score', score); 
    
    // 2. 히스토리 데이터 업데이트 (최근 5회 평균 산출용)
    let history = JSON.parse(localStorage.getItem(gameId + '_history')) || [];
    history.push(score);
    if(history.length > 10) history.shift(); // 최대 10개 유지
    localStorage.setItem(gameId + '_history', JSON.stringify(history));
    
    // 3. 리포트 페이지로 이동
    location.href = 'report.html';
}
        window.onload = initGame;
    </script>
